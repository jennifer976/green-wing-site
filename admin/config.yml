# Decap CMS — Green Wing Energy Solutions
# Editors: use the left-hand menu by task. Images have their own sections.

backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: assets/images
public_folder: /assets/images

site_url: https://greenwingenergysolutions.com
display_url: https://greenwingenergysolutions.com
logo_url: /assets/images/green-wing-logo-full-colour.svg

collections:
  - name: insights
    label: Blog articles
    label_singular: Blog article
    folder: content/insights
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: Title, name: title, widget: string, hint: "The main article headline." }
      - { label: Publish date, name: date, widget: datetime, hint: "Newest dated posts appear first on the website." }
      - { label: SEO description, name: description, widget: text, hint: "Short Google/search description. Aim for one sentence." }
      - { label: Listing summary, name: excerpt, widget: text, hint: "Short summary shown on the Insights listing page." }
      - { label: Featured image, name: image, widget: image, choose_url: false, hint: "Main image for the article card and article header." }
      - { label: Image alt text, name: imageAlt, widget: string, required: false, hint: "Briefly describe the image for accessibility." }
      - { label: Feature on Insights hub, name: featured, widget: boolean, default: false }
      - { label: Show Scope 1/2/3 infographic, name: showScopeInfographic, widget: boolean, default: false }
      - label: Article body
        name: body
        widget: markdown
        modes: ["rich_text", "raw"]
        hint: "Paste copy directly, or switch to Markdown/raw mode. Use Heading 2 for section headings."
        default: |
          Start with a short opening paragraph that explains the issue and why it matters.

          ## Section heading

          Add the main points here.

          - Useful point one
          - Useful point two
          - Useful point three

          ## What to do next

          Finish with a practical takeaway or next step.

