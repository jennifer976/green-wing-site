  - name: solutions
    label: Solutions / technologies
    label_singular: Solution
    folder: content/solutions
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{category}} — {{title}}"
    fields:
      - { label: Title, name: title, widget: string }
      - label: Category
        name: category
        widget: select
        options:
          - "Cooling & refrigeration"
          - "Power & electricity"
          - "Heating & combustion"
          - "Lighting & visibility"
      - { label: Sort order, name: order, widget: number, value_type: int, min: 1, hint: "Lower numbers appear higher in the list." }
      - { label: Image, name: image, widget: image, choose_url: false }
      - { label: Image alt text, name: imageAlt, widget: string }
      - label: Image fit
        name: imageFit
        widget: select
        default: cover
        hint: "Use Fill/crop for photos. Use Show whole image for product shots with transparent or white backgrounds."
        options:
          - { label: "Fill tile / crop edges", value: cover }
          - { label: "Show whole image", value: contain }
      - label: Image focus
        name: imagePosition
        widget: select
        default: center center
        hint: "Choose which part stays centred when the image is cropped or zoomed."
        options:
          - { label: "Centre", value: "center center" }
          - { label: "Top", value: "center top" }
          - { label: "Bottom", value: "center bottom" }
          - { label: "Left", value: "left center" }
          - { label: "Right", value: "right center" }
      - { label: Image zoom, name: imageZoom, widget: number, default: 1, value_type: float, min: 1, max: 2.5, step: 0.05, hint: "Increase this to make small product images larger inside the solution tile." }
      - { label: Description, name: body, widget: markdown, modes: ["rich_text", "raw"] }

  - name: case_studies
    label: Results / case studies
    label_singular: Case study
    folder: content/case-studies
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}}"
    fields:
      - { label: Headline, name: title, widget: string }
      - { label: Sector label, name: sectorLabel, widget: string, hint: "e.g. Hospitality · Air conditioning" }
      - { label: Stat (large), name: stat, widget: string, hint: "e.g. Up to 30%" }
      - { label: Stat label, name: statLabel, widget: string }
      - { label: Challenge, name: challenge, widget: text }
      - { label: What we did, name: whatWeDid, widget: text }
      - { label: Result, name: result, widget: text }
      - { label: Card image, name: image, widget: image, choose_url: false }
      - { label: Image alt text, name: imageAlt, widget: string }
      - { label: Proof strip stat, name: proofStat, widget: string }
      - { label: Proof strip label, name: proofLabel, widget: string }
      - { label: Proof strip description, name: proofDesc, widget: string }
      - { label: Sort order, name: order, widget: number, value_type: int, min: 1, hint: "Lower numbers appear first." }
      - label: Related links
        name: links
        widget: list
        required: false
        fields:
          - { label: Link text, name: label, widget: string }
          - { label: URL, name: url, widget: string, hint: "e.g. solutions.html or insights/proving-savings.html" }

  - name: page_text
    label: Page text / reviews
    files:
      - name: solutions_page
        label: Solutions page intro
        file: _data/solutions-page.json
        fields:
          - { label: Intro paragraph, name: intro, widget: text, hint: "HTML links are allowed here." }
      - name: case_studies_page
        label: Results page reviews and trust text
        file: _data/caseStudiesPage.json
        fields:
          - { label: Main quote, name: quote, widget: text }
          - { label: Attribution name, name: quoteAttribution, widget: string }
          - { label: Attribution role/company, name: quoteCite, widget: string }
          - label: Partner and contractor trust section
            name: partnerTrust
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Body, name: body, widget: text }
              - label: Trust points
                name: items
                widget: list
                field: { label: Point, name: point, widget: string }
          - label: Client reviews
            name: reviews
            widget: list
            required: false
            fields:
              - { label: Quote, name: quote, widget: text }
              - { label: Name / role, name: name, widget: string }
              - { label: Context, name: context, widget: string, required: false }
      - name: referrals_page
        label: Referrals and endorsements page
        file: _data/referralsPage.json
        fields:
          - { label: Hero eyebrow, name: heroEyebrow, widget: string }
          - { label: Page title, name: title, widget: string }
          - { label: Intro paragraph, name: lead, widget: text }
          - label: Referral explanation
            name: intro
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Body, name: body, widget: text }
              - label: Bullet points
                name: items
                widget: list
                field: { label: Point, name: point, widget: string }
          - { label: Placeholder title, name: placeholderTitle, widget: string }
          - { label: Placeholder body, name: placeholderBody, widget: text }
          - label: Endorsements
            name: endorsements
            widget: list
            required: false
            fields:
              - { label: Quote, name: quote, widget: text }
              - { label: Name / role, name: name, widget: string }
              - { label: Context, name: context, widget: string, required: false }
